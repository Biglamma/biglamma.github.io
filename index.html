<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>MOTHERSHIP SUPPLY DROP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo">SUPPLY DROP</div>
      <div class="hdr-sub">// Mothership</div>
    </div>

    <div style="position: relative;">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="menu-dropdown" id="menuDropdown">
        <button class="menu-item active" data-tab="main">Main</button>
        <button class="menu-item" data-tab="inventory">Inventory</button>
        <button class="menu-item" data-tab="loot">Loot Table</button>
      </div>
    </div>
  </header>

  <div class="content-panel active" id="mainPanel">
    <div class="main-layout">
      <div id="rarityFilter"></div>
      <div id="mainContent">
        <nav class="cases" id="caseNav"></nav>

        <div class="reel-section">
          <button class="open-btn" id="openBtn">
            <div class="open-btn-text">OPEN CASE</div>
          </button>

          <div class="reel-wrap" id="reelWrap">
            <div class="reel-marker"></div>
            <div class="reel-fade reel-fade-l"></div>
            <div class="reel-fade reel-fade-r"></div>
            <div class="reel-track" id="reelTrack"></div>
          </div>

          <div class="result-panel" id="resultPanel">
            <div class="result-stripe" id="resultStripe"></div>
            <div class="result-body">
              <div class="result-img-wrap" id="resultImgWrap">
                <div class="result-img-glow" id="resultGlow"></div>
                <div class="result-icon" id="resultIcon"></div>
              </div>

              <div class="result-info">
                <div class="result-rarity" id="resultRarity"></div>
                <div class="result-name" id="resultName"></div>
                <div class="result-desc" id="resultDesc"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="content-panel" id="inventoryPanel">
    <div class="inv-section">
      <div class="inv-label">
        <span>// Inventory</span>
        <span class="inv-count" id="invCount">0</span>
      </div>

      <div class="inv-grid" id="invGrid">
        <div class="inv-empty">No items yet</div>
      </div>
    </div>
  </div>

  <div class="content-panel" id="lootPanel">
    <div class="loot-section">
      <div class="loot-label">// Drop Pools</div>
      <div id="lootContent"></div>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
