<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Let It Ride - a loot generation tool">
  <meta name="theme-color" content="#000000">
  <meta property="og:title" content="Let It Ride">
  <meta property="og:description" content="Random loot generation with inventory and loot table">
  <title>Let It Ride</title>
  <link rel="preload" as="style" href="style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<noscript>
  <p>This application requires JavaScript to be enabled. Please enable JavaScript in your browser settings.</p>
</noscript>
<div class="page">
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo" id="siteHeader" role="button" aria-haspopup="true">System</div>
      <nav class="system-menu" id="systemMenu" aria-label="Game system">
        <button type="button" class="system-menu-item active" data-system="mothership">Mothership</button>
        <button type="button" class="system-menu-item" data-system="dnd">D&amp;D</button>
      </nav>
    </div>
    <div class="hdr-right">
      <button type="button" class="menu-btn" id="menuBtn" aria-label="Open menu" aria-expanded="false">☰</button>
      <nav class="menu-dropdown" id="menuDropdown" aria-label="Navigation">
        <button type="button" class="menu-item active" data-tab="main">Stashes</button>
        <button type="button" class="menu-item" data-tab="inventory">Inventory</button>
        <button type="button" class="menu-item" data-tab="loot">Loot Table</button>
      </nav>
    </div>
  </header>
  <main>
    <section class="content-panel" id="mainPanel">
      <div id="caseGroups"></div>
      <div class="case-open-container" id="caseOpenContainer" hidden>
        <div class="reel-wrap" id="reelWrap" hidden>
          <div class="reel-track" id="reelTrack" aria-live="polite" aria-atomic="true"></div>
        </div>
        <div class="reel-controls">
          <button type="button" class="open-btn" id="openBtn">OPEN</button>
          <button type="button" class="back-btn" id="backBtn">← Back</button>
        </div>
      </div>
    </section>
    <section class="content-panel" id="inventoryPanel" hidden>
      <div id="invFilters" class="filter-stack"></div>
      <div id="invContent"></div>
    </section>
    <section class="content-panel" id="lootPanel" hidden>
      <div id="lootFilters" class="filter-stack"></div>
      <div id="lootContent"></div>
    </section>
  </main>
</div>
<script src="script.js" defer></script>
</body>
</html>
