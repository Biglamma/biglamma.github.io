<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>SUPPLY DROP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo">SUPPLY DROP</div>
    </div>

    <div style="position: relative;">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="menu-dropdown" id="menuDropdown">
        <button class="menu-item active" data-tab="main">Main</button>
        <button class="menu-item" data-tab="inventory">Inventory</button>
        <button class="menu-item" data-tab="loot">Loot Table</button>
      </div>
    </div>
  </header>

  <!-- MAIN PANEL -->
  <div class="content-panel active" id="mainPanel">

    <!-- CASE SELECTION GRID -->
    <div class="case-select-grid" id="caseSelectGrid"></div>

    <!-- CASE OPENING -->
    <div class="case-open-container" id="caseOpenContainer">
      <div class="reel-controls">
        <button class="open-btn" id="openBtn">OPEN CASE</button>
        <button class="back-btn" id="backBtn">← BACK</button>
      </div>

      <div class="reel-section">
        <div class="reel-wrap" id="reelWrap">
          <div class="reel-track" id="reelTrack"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- INVENTORY PANEL -->
  <div class="content-panel" id="inventoryPanel">
    <div class="inv-section">
      <div class="inv-label">
        <span>// Inventory</span>
        <span class="inv-count" id="invCount">0 items</span>
      </div>
      <div id="invGrid">
        <div class="inv-empty">No items yet</div>
      </div>
    </div>
  </div>

  <!-- LOOT TABLE PANEL -->
  <div class="content-panel" id="lootPanel">
    <div class="loot-section">
      <div class="loot-label">// Drop Pools</div>

      <!-- RARITY TABS -->
      <div class="rarity-tabs" id="rarityTabs"></div>

      <div id="lootContent"></div>
    </div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
