<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A loot rolling tool">
  <meta name="theme-color" content="#000000">
  <meta property="og:title" content="Let It Ride">
  <meta property="og:description" content="Random loot generation with inventory and loot table">
  <title>Let It Ride</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="preload" as="style" href="style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<noscript>
  <p>This application requires JavaScript to be enabled. Please enable JavaScript in your browser settings.</p>
</noscript>
<div class="page">
  <header class="hdr">
    <div class="hdr-left">
      <div class="hdr-logo" id="systemSwitcherBtn" role="button" aria-haspopup="true">
        System<span class="hdr-logo-arrow">▾</span>
      </div>
      <nav class="system-switcher-menu" id="systemSwitcherMenu" aria-label="Game system">
        <button type="button" class="system-menu-item active" data-system="mothership">Mothership</button>
        <button type="button" class="system-menu-item" data-system="dnd">D&amp;D</button>
      </nav>
    </div>
    <div class="hdr-center">
      <span class="panel-nav-item active" data-tab="main">ROLL</span>
      <span class="panel-nav-item" data-tab="inventory">INV</span>
      <span class="panel-nav-item" data-tab="loot">LOOT</span>
    </div>
    <div class="hdr-right">
      <button type="button" class="menu-btn" id="navMenuBtn" aria-label="Open menu" aria-expanded="false">☰</button>
      <nav class="menu-dropdown" id="navMenuDropdown" aria-label="Navigation">
        <button type="button" class="menu-item active" data-tab="main">Stashes</button>
        <button type="button" class="menu-item" data-tab="inventory">Inventory</button>
        <button type="button" class="menu-item" data-tab="loot">Loot Table</button>
      </nav>
    </div>
  </header>
  <main>
    <section class="content-panel" id="mainPanel">
      <div id="caseGridContainer"></div>
      <div class="case-open-view" id="caseOpenView" hidden>
        <div class="case-preview" id="casePreview">
          <div class="case-preview-icon" id="casePreviewIcon">📦</div>
          <div class="case-preview-name" id="casePreviewName">Placeholder</div>
        </div>
        <div class="reel-container" id="reelContainer" hidden>
          <div class="reel-item-track" id="reelItemTrack" aria-live="polite" aria-atomic="true"></div>
        </div>
        <div class="reel-controls">
          <button type="button" class="open-case-btn" id="openCaseBtn">OPEN</button>
          <button type="button" class="back-to-cases-btn" id="backToCasesBtn">← Back</button>
        </div>
      </div>
    </section>
    <section class="content-panel" id="inventoryPanel" hidden>
      <div id="inventoryFilters" class="filter-stack"></div>
      <div id="inventoryContent"></div>
    </section>
    <section class="content-panel" id="lootPanel" hidden>
      <div id="lootTableFilters" class="filter-stack"></div>
      <div id="lootTableContent"></div>
    </section>
  </main>
</div>
<script src="script.js" defer></script>
</body>
</html>
